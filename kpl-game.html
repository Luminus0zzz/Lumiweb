<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者榮耀職業選手人生模擬器</title>
<style>
:root{
  --bg:#0a0c12;--panel:#13161f;--border:#1e2433;--accent:#f0a500;
  --accent2:#3a7bd5;--red:#e03a3a;--green:#3adb76;--text:#d0d8f0;
  --sub:#6a7490;--bar:#1e2433;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei',sans-serif;min-height:100vh;line-height:1.6;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}

.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* ── TITLE ── */
#s-title{flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0d1629 0%,#0a0c12 70%);text-align:center;padding:40px;}
#s-title h1{font-size:2.6rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#f0a500,#e8d000,#f0a500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;}
#s-title .sub{color:var(--sub);font-size:.95rem;margin-bottom:3rem;}
.btn-main{background:linear-gradient(135deg,#f0a500,#c88000);color:#0a0c12;font-size:1.1rem;font-weight:700;
  padding:14px 50px;border-radius:30px;box-shadow:0 0 20px rgba(240,165,0,.4);transition:transform .2s,box-shadow .2s;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(240,165,0,.6);}
.badge{display:inline-block;margin-top:2rem;padding:6px 16px;border:1px solid var(--border);border-radius:20px;color:var(--sub);font-size:.8rem;}

/* ── CREATE ── */
#s-create{flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;}
.create-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:520px;}
.create-box h2{font-size:1.5rem;font-weight:800;margin-bottom:24px;color:var(--accent);}
.form-row{margin-bottom:18px;}
.form-row label{display:block;font-size:.85rem;color:var(--sub);margin-bottom:6px;}
.form-row input,.form-row select{width:100%;background:#0d1020;border:1px solid var(--border);
  color:var(--text);padding:10px 14px;border-radius:8px;font-size:.95rem;font-family:inherit;}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--accent);}
.form-row select option{background:#0d1020;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.career-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px;}
.career-btn{background:#0d1020;border:1px solid var(--border);color:var(--sub);padding:10px 6px;
  border-radius:8px;font-size:.82rem;text-align:center;transition:all .2s;}
.career-btn:hover{border-color:var(--accent2);color:var(--text);}
.career-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(240,165,0,.08);}
.pos-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:4px;}
.pos-btn{background:#0d1020;border:1px solid var(--border);color:var(--sub);padding:8px 4px;
  border-radius:6px;font-size:.8rem;transition:all .2s;}
.pos-btn:hover{border-color:var(--accent2);color:var(--text);}
.pos-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(240,165,0,.08);}
.create-hint{font-size:.78rem;color:var(--sub);margin-top:4px;}

/* ── GAME ── */
#s-game{flex-direction:row;align-items:stretch;}
#left-panel{width:276px;min-width:256px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:18px 16px;overflow-y:auto;}
.player-card{text-align:center;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.player-avatar{width:64px;height:64px;border-radius:50%;margin:0 auto 8px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;color:#fff;}
.player-name{font-size:1rem;font-weight:700;}
.player-id{font-size:.78rem;color:var(--sub);}
.player-stage{display:inline-block;margin-top:5px;padding:2px 10px;border-radius:10px;
  font-size:.7rem;font-weight:700;background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.3);color:var(--accent);}
.section-label{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--sub);margin-bottom:7px;margin-top:10px;}
.stat-row{margin-bottom:7px;}
.stat-header{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:3px;}
.stat-name{color:var(--sub);}
.stat-val{font-weight:700;}
.stat-delta{font-size:.68rem;font-weight:700;opacity:0;transition:opacity .3s;}
.stat-delta.pos{color:var(--green);}
.stat-delta.neg{color:var(--red);}
.stat-delta.show{opacity:1;}
.stat-bar-track{height:5px;background:var(--bar);border-radius:3px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
/* money */
.money-box{background:#0d1020;border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-top:4px;}
.money-amount{font-size:1.15rem;font-weight:800;color:var(--green);}
.money-row{font-size:.72rem;color:var(--sub);margin-top:2px;}
.money-team{font-size:.74rem;color:var(--accent2);margin-top:3px;font-weight:600;}
.transfer-indicator{display:inline-block;padding:1px 7px;border-radius:8px;font-size:.62rem;font-weight:700;
  background:rgba(240,165,0,.2);border:1px solid rgba(240,165,0,.4);color:var(--accent);
  animation:blink 1.5s infinite;margin-left:5px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
/* fans */
.fan-box{background:#0d1020;border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-top:8px;}
.fan-count{font-size:1.15rem;font-weight:800;color:var(--accent);}
.fan-tier{font-size:.7rem;color:var(--sub);}
/* progress */
.progress-box{margin-top:10px;}
.progress-label{display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:4px;}
.progress-track{height:6px;background:var(--bar);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .8s ease;}
.turn-info{margin-top:9px;font-size:.76rem;color:var(--sub);}
.turn-info span{color:var(--text);font-weight:700;}

/* ── RIGHT PANEL ── */
#right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#event-area{flex:1;overflow-y:auto;padding:26px 30px;display:flex;flex-direction:column;}

/* single-card animations */
@keyframes pageIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.event-card,.match-card,.transfer-card,.salary-card,.stage-card{
  animation:pageIn .35s ease;max-width:740px;width:100%;
}

.event-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 24px;}
.event-stage-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.68rem;font-weight:700;
  margin-bottom:10px;background:rgba(58,123,213,.15);border:1px solid rgba(58,123,213,.3);color:var(--accent2);}
.event-title{font-size:1.12rem;font-weight:800;margin-bottom:10px;}
.event-text{font-size:.9rem;color:#b0bcd8;line-height:1.9;}
.choices{margin-top:16px;display:flex;flex-direction:column;gap:9px;}
.choice-btn{background:#0d1020;border:1px solid var(--border);color:var(--text);padding:11px 16px;
  border-radius:10px;font-size:.88rem;text-align:left;transition:all .2s;}
.choice-btn:hover:not(:disabled){border-color:var(--accent2);background:rgba(58,123,213,.08);}
.choice-btn.chosen{border-color:var(--accent);background:rgba(240,165,0,.08);}
.choice-btn:disabled{opacity:.6;}
.result-box{background:rgba(58,123,213,.06);border:1px solid rgba(58,123,213,.2);border-radius:10px;
  padding:13px 15px;margin-top:13px;font-size:.87rem;line-height:1.8;color:#c0ccec;animation:pageIn .3s ease;}
.delta-line{margin-top:8px;font-size:.78rem;display:flex;flex-wrap:wrap;gap:6px;}
.d-pos{color:var(--green);}
.d-neg{color:var(--red);}
.d-neu{color:var(--sub);}
.d-money{color:#ffd700;}
.btn-next{margin-top:13px;background:linear-gradient(135deg,#3a7bd5,#2a5aa0);color:#fff;
  padding:10px 24px;border-radius:8px;font-size:.88rem;font-weight:700;transition:transform .2s,box-shadow .2s;}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(58,123,213,.4);}

/* match card */
.match-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 24px;}
.match-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.68rem;font-weight:700;
  margin-bottom:10px;background:rgba(224,58,58,.12);border:1px solid rgba(224,58,58,.3);color:var(--red);}
.match-result{font-size:1.4rem;font-weight:900;margin:8px 0;}
.win{color:var(--green);}
.loss{color:var(--red);}
.match-detail{color:var(--sub);font-size:.86rem;margin-bottom:4px;}

/* transfer window */
.transfer-card{background:var(--panel);border:2px solid rgba(240,165,0,.4);border-radius:14px;
  padding:22px 24px;box-shadow:0 0 28px rgba(240,165,0,.12);}
.transfer-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.68rem;font-weight:700;
  margin-bottom:10px;background:rgba(240,165,0,.15);border:1px solid rgba(240,165,0,.4);color:var(--accent);}
.offers-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.offer-item{background:#0d1020;border:1px solid var(--border);border-radius:10px;padding:13px 15px;transition:border-color .2s;}
.offer-item:hover{border-color:rgba(240,165,0,.4);}
.offer-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.offer-name{font-size:.95rem;font-weight:800;}
.offer-tier{display:inline-block;padding:1px 7px;border-radius:6px;font-size:.65rem;font-weight:700;}
.tier-S{background:rgba(240,165,0,.2);color:var(--accent);}
.tier-A{background:rgba(58,123,213,.2);color:var(--accent2);}
.tier-B{background:rgba(106,116,144,.2);color:var(--sub);}
.offer-desc{font-size:.78rem;color:var(--sub);margin-bottom:8px;}
.offer-stats{display:flex;flex-wrap:wrap;gap:8px;font-size:.78rem;margin-bottom:10px;}
.offer-salary-val{color:var(--green);font-weight:700;}
.btn-offer{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.4);color:var(--accent);
  padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:700;transition:all .2s;}
.btn-offer:hover{background:rgba(240,165,0,.18);}
.btn-decline{background:#0d1020;border:1px solid var(--border);color:var(--sub);
  padding:10px 20px;border-radius:8px;font-size:.84rem;margin-top:12px;transition:all .2s;width:100%;}
.btn-decline:hover{border-color:var(--red);color:var(--red);}

/* salary card */
.salary-card{background:var(--panel);border:1px solid rgba(58,213,100,.25);border-radius:14px;padding:22px 24px;}
.salary-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.68rem;font-weight:700;
  margin-bottom:10px;background:rgba(58,213,100,.1);border:1px solid rgba(58,213,100,.3);color:var(--green);}

/* stage transition */
.stage-card{background:var(--panel);border:2px solid var(--accent);border-radius:14px;padding:22px 24px;
  box-shadow:0 0 20px rgba(240,165,0,.14);}

/* log area */
#log-area{height:110px;border-top:1px solid var(--border);overflow-y:auto;padding:9px 18px;background:#0d1020;flex-shrink:0;}
.log-entry{font-size:.72rem;color:var(--sub);padding:1px 0;border-bottom:1px solid rgba(30,36,51,.4);}
.log-entry:last-child{border:none;}
.log-turn{color:var(--accent2);font-weight:700;margin-right:5px;}

/* ── END ── */
#s-end{flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;
  background:radial-gradient(ellipse at center,#0d1629 0%,#0a0c12 70%);}
.end-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:36px;max-width:560px;width:100%;}
.end-title{font-size:1.8rem;font-weight:900;color:var(--accent);margin-bottom:8px;}
.end-sub{color:var(--sub);margin-bottom:22px;}
.end-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.end-stat-item{background:#0d1020;border:1px solid var(--border);border-radius:10px;padding:12px;}
.end-stat-label{font-size:.73rem;color:var(--sub);}
.end-stat-val{font-size:1.15rem;font-weight:800;color:var(--accent);}
.end-comment{background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.2);border-radius:10px;
  padding:14px;font-size:.88rem;color:#c0b870;margin-bottom:20px;line-height:1.8;}
</style>
</head>
<body>

<!-- TITLE -->
<div id="s-title" class="screen active">
  <h1>王者榮耀<br>職業選手人生模擬器</h1>
  <p class="sub">從路人王到KPL頂峰，你的電競生涯由你書寫</p>
  <button class="btn-main" onclick="goCreate()">開始遊戲</button>
  <div class="badge">純文字 · 無需API · 金錢/轉會系統 · 多結局</div>
</div>

<!-- CREATE -->
<div id="s-create" class="screen">
  <div class="create-box">
    <h2>創建選手檔案</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>真實姓名</label>
        <input id="c-name" placeholder="例：林小宇" maxlength="8">
      </div>
      <div class="form-row">
        <label>遊戲ID</label>
        <input id="c-id" placeholder="例：Phantom" maxlength="16">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>年齡</label>
        <select id="c-age">
          <option value="16">16歲</option>
          <option value="17">17歲</option>
          <option value="18" selected>18歲</option>
          <option value="19">19歲</option>
          <option value="20">20歲</option>
        </select>
      </div>
      <div class="form-row">
        <label>性別</label>
        <select id="c-gender">
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>主要位置</label>
      <div class="pos-grid" id="pos-grid">
        <button class="pos-btn" data-val="打野">打野</button>
        <button class="pos-btn" data-val="中路">中路</button>
        <button class="pos-btn" data-val="對抗路">對抗路</button>
        <button class="pos-btn" data-val="輔助">輔助</button>
        <button class="pos-btn" data-val="射手">射手</button>
      </div>
    </div>
    <div class="form-row">
      <label>入行背景</label>
      <div class="career-grid" id="career-grid">
        <button class="career-btn" data-val="天才少年" data-tip="技術天花板高，但容易驕傲">天才少年</button>
        <button class="career-btn" data-val="努力型" data-tip="成長穩定，狀態一致">努力型</button>
        <button class="career-btn" data-val="直播出道" data-tip="粉絲基礎好，但技術需打磨">直播出道</button>
        <button class="career-btn" data-val="線下賽出身" data-tip="臨場感強，團隊配合好">線下賽出身</button>
        <button class="career-btn" data-val="半路轉職" data-tip="起點低，但可塑性強">半路轉職</button>
        <button class="career-btn" data-val="電競世家" data-tip="資源豐富，壓力也大">電競世家</button>
      </div>
      <div class="create-hint" id="career-tip">選擇背景以查看說明</div>
    </div>
    <div class="form-row">
      <label>標誌性英雄（選填）</label>
      <input id="c-heroes" placeholder="例：魯班七號, 孫悟空" maxlength="30">
    </div>
    <button class="btn-main" style="width:100%;margin-top:8px;" onclick="startGame()">踏上征程</button>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div id="left-panel">
    <div class="player-card">
      <div class="player-avatar" id="avatar-letter">A</div>
      <div class="player-name" id="p-name">林小宇</div>
      <div class="player-id" id="p-id">@Phantom</div>
      <div class="player-stage" id="p-stage">路人期</div>
    </div>

    <div class="section-label">核心數值</div>
    <div id="stats-panel"></div>

    <div class="section-label">財務狀況</div>
    <div class="money-box">
      <div class="money-amount" id="money-amount">¥0</div>
      <div class="money-row" id="money-salary">月薪：¥0 / 回合</div>
      <div class="money-team" id="money-team"></div>
    </div>

    <div class="section-label">粉絲</div>
    <div class="fan-box">
      <div class="fan-count" id="fan-count">0</div>
      <div class="fan-tier" id="fan-tier">無名選手</div>
    </div>

    <div class="progress-box">
      <div class="progress-label">
        <span id="stage-from">路人期</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-bar" style="width:0%"></div></div>
      <div class="progress-label" style="margin-top:3px;">
        <span style="color:var(--sub);font-size:.7rem;">距晉升</span>
        <span id="stage-to" style="color:var(--accent2);font-size:.7rem;">青訓期</span>
      </div>
    </div>

    <div class="turn-info">第 <span id="turn-num">1</span> 回合 &nbsp;|&nbsp; 疲勞 <span id="fatigue-num">20</span></div>
    <div class="turn-info" style="margin-top:3px;">狀態：<span id="health-state">正常</span></div>
  </div>

  <div id="right-panel">
    <div id="event-area"></div>
    <div id="log-area"></div>
  </div>
</div>

<!-- END -->
<div id="s-end" class="screen">
  <div class="end-box">
    <div class="end-title" id="end-title">生涯落幕</div>
    <div class="end-sub" id="end-sub">你的電競旅途已走到終點</div>
    <div class="end-stats" id="end-stats"></div>
    <div class="end-comment" id="end-comment"></div>
    <button class="btn-main" onclick="location.reload()">再次挑戰</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const STAGES = [
  { name:'路人期',    next:'青訓/試訓期' },
  { name:'青訓/試訓', next:'KGL聯賽' },
  { name:'KGL聯賽',  next:'KPL正賽' },
  { name:'KPL正賽',  next:'知名選手' },
  { name:'知名選手',  next:'生涯巔峰' },
  { name:'生涯巔峰',  next:'' },
];
const STAT_CFG = [
  { key:'op', label:'操作水平', color:'#3a7bd5' },
  { key:'aw', label:'意識大局', color:'#8b5cf6' },
  { key:'tf', label:'團隊配合', color:'#059669' },
  { key:'mt', label:'心理素質', color:'#d97706' },
  { key:'cm', label:'個人魅力', color:'#db2777' },
];
const STAGE_SALARIES = [0, 3000, 8000, 30000, 100000, 250000];
const STAGE_EXPENSES = [0, 0,    3000, 10000, 20000,  40000];

const TEAMS = {
  S:[
    { name:'天狼星電競',  desc:'KPL頂級豪門，歷史三冠王' },
    { name:'龍魂戰隊',   desc:'王者榮耀歷史最強戰隊之一' },
    { name:'神盾電競',   desc:'近年崛起的新銳豪門戰隊' },
  ],
  A:[
    { name:'焰火戰隊',   desc:'穩定的KPL老牌球隊' },
    { name:'星辰電競',   desc:'以技術流打法著稱的球隊' },
    { name:'雷霆戰隊',   desc:'作風強悍的攻擊型球隊' },
    { name:'極光電競',   desc:'近年快速崛起的黑馬球隊' },
  ],
  B:[
    { name:'鐵血意志',   desc:'靠頑強防守立足KPL的戰隊' },
    { name:'流星戰隊',   desc:'從KGL升格的新晉球隊' },
    { name:'海浪電競',   desc:'有潛力但缺乏大賽經驗的隊伍' },
  ],
};

// ══════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════
let G = null;

function initG(char, career){
  const presets = {

// HELPERS

function $(id){ return document.getElementById(id); }
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function fanTier(n){
  if(n<100)    return '無名選手';
  if(n<2000)   return '初露鋒芒';
  if(n<20000)  return '小有名氣';
  if(n<200000) return '知名選手';
  return '頂級明星';
}
function fmtFans(n){
  if(n>=10000) return (n/10000).toFixed(1)+'萬';
  return n+'';
}
function fmtMoney(n){
  const abs = Math.abs(n);
  let s;
  if(abs>=100000000) s=(abs/100000000).toFixed(2)+'億';
  else if(abs>=10000) s=(abs/10000).toFixed(1)+'萬';
  else s=abs.toLocaleString();
  return (n<0?'-':'')+'¥'+s;
}

let deltaTimers = {};
function refreshPanel(deltas={}){
  $('avatar-letter').textContent = G.char.name[0]||'?';
  $('p-name').textContent = G.char.name;
  $('p-id').textContent = '@'+G.char.id;
  $('p-stage').textContent = STAGES[G.stage].name;

  const html = STAT_CFG.map(s=>{
    const v = Math.min(G.cap[s.key], Math.max(0, G.stats[s.key]));
    const d = deltas[s.key];
    const dClass = d>0?'pos':d<0?'neg':'';
    const dText  = d>0?`+${d}`:d<0?`${d}`:'';
    return `<div class="stat-row">
      <div class="stat-header">
        <span class="stat-name">${s.label}</span>
        <span class="stat-val">${Math.round(v)}</span>
        ${dText?`<span class="stat-delta ${dClass} show" id="sd-${s.key}">${dText}</span>`:`<span class="stat-delta" id="sd-${s.key}"></span>`}
      </div>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${v}%;background:${s.color}"></div></div>
    </div>`;
  }).join('');
  $('stats-panel').innerHTML = html;

  if(Object.keys(deltas).length){
    STAT_CFG.forEach(s=>{
      if(deltaTimers[s.key]) clearTimeout(deltaTimers[s.key]);
      deltaTimers[s.key] = setTimeout(()=>{ const el=$(`sd-${s.key}`); if(el) el.classList.remove('show'); }, 2500);
    });
  }

  // Money
  $('money-amount').textContent = fmtMoney(G.money);
  $('money-salary').textContent = G.salary > 0 ? `月薪：${fmtMoney(G.salary)} / 回合` : '月薪：尚未職業化';
  $('money-team').textContent = G.currentTeam
    ? `效力：${G.currentTeam}`
    : (G.stage === 0 ? '身份：路人/自由選手' : '');

  // Fans
  $('fan-count').textContent = fmtFans(G.fans);
  $('fan-tier').textContent = fanTier(G.fans);

  // Progress
  const pct = Math.min(100, G.progress);
  $('prog-bar').style.width = pct+'%';
  $('prog-pct').textContent = Math.round(pct)+'%';
  $('stage-from').textContent = STAGES[G.stage].name;
  $('stage-to').textContent = STAGES[G.stage].next || '功成身退';

  // Turn
  $('turn-num').textContent = G.turn+1;
  $('fatigue-num').textContent = Math.round(G.fatigue);
  const hMap = { fine:'正常', warning:'需要注意', injured:'受傷' };
  $('health-state').textContent = hMap[G.health]||'正常';
}

// EVENT PICKING
// ══════════════════════════════════════════════
function pickEvent(){
  if(G.progress >= 100){
    const ms = EVENTS.find(e=>e.stages.includes(G.stage) && e.milestone && !G.seenOnce.has(e.id));
    if(ms){ G.progress = 100; return ms; }
  }
  const pool = EVENTS.filter(e=>{
    if(!e.stages.includes(G.stage)) return false;
    if(e.milestone) return false;
    if(e.once && G.seenOnce.has(e.id)) return false;
    return true;
  });
  if(pool.length === 0) return null;
  const total = pool.reduce((s,e)=>s+e.weight, 0);
  let r = Math.random()*total;
  for(const e of pool){ r -= e.weight; if(r<=0) return e; }
  return pool[pool.length-1];
}

// MATCH SIMULATION
// ══════════════════════════════════════════════
function simulateMatch(){
  const { op, aw, tf, mt } = G.stats;
  const score = (op*0.4 + aw*0.3 + tf*0.3) * (mt/100) * (1 - G.fatigue/200);
  const threshold = 50 + Math.random()*25;
  const win = score > threshold;
  const bonusFans = Math.floor(Math.random()*300+100);
  if(win){ G.matchWins++; G.fans += bonusFans; }
  else { G.matchLosses++; G.fatigue += 5; }
  G.fatigue = Math.min(100, G.fatigue + 8);
  G.progress += win ? 8 : 3;
  return { win, bonusFans };
}

function renderMatch(){
  const { win, bonusFans } = simulateMatch();
  clearPage();
  const div = document.createElement('div');
  div.className = 'match-card';
  div.innerHTML = `
    <div class="match-tag">⚔ 週賽結算</div>
    <div class="match-result ${win?'win':'loss'}">${win?'勝利！':'敗北...'}</div>
    <div class="match-detail">${win
      ? `你的${G.char.pos}發揮穩定，帶領隊伍拿下了比賽。`
      : `這場比賽暴露了一些短板，需要繼續改進。`
    }</div>
    <div class="delta-line" style="margin-top:10px;">
      <span class="${win?'d-pos':'d-neg'}">${win?'進度+8':'進度+3'}</span>
      <span class="d-neg">疲勞+${win?8:13}</span>
      ${win?`<span class="d-pos">粉絲+${bonusFans}</span>`:''}
    </div>
    <button class="btn-next" onclick="nextTurn()">繼續 →</button>
  `;
  $('event-area').appendChild(div);
  refreshPanel();
  addLog(`週賽：${win?'勝利':'失敗'}`);
}

// ══════════════════════════════════════════════
// APPLY EFFECT
// ══════════════════════════════════════════════
function applyEffect(eff){
  const deltas = {};
  ['op','aw','tf','mt','cm'].forEach(k=>{
    if(eff[k] !== undefined){
      deltas[k] = eff[k];
      G.stats[k] = Math.min(G.cap[k], Math.max(0, G.stats[k]+eff[k]));
    }
  });
  if(eff.fans     !== undefined) G.fans     = Math.max(0, G.fans+eff.fans);
  if(eff.fatigue  !== undefined) G.fatigue  = Math.min(100, Math.max(0, G.fatigue+eff.fatigue));
  if(eff.teamRel  !== undefined) G.teamRel  = Math.min(100, Math.max(0, G.teamRel+eff.teamRel));
  if(eff.coachRel !== undefined) G.coachRel = Math.min(100, Math.max(0, G.coachRel+eff.coachRel));
  if(eff.pubRisk  !== undefined) G.pubRisk  = Math.min(100, Math.max(0, G.pubRisk+eff.pubRisk));
  if(eff.progress !== undefined) G.progress = Math.min(105, G.progress+eff.progress);
  if(eff.money    !== undefined){
    deltas.money = eff.money;
    G.money = Math.max(0, G.money+eff.money);
    if(eff.money > 0) G.totalEarned += eff.money;
  }
  return deltas;
}

// RENDER EVENT (replaces, not appends)
// ══════════════════════════════════════════════
function renderEvent(ev){
  clearPage();
  const div = document.createElement('div');
  div.className = 'event-card';
  div.innerHTML = `
    <div class="event-stage-tag">${STAGES[G.stage].name}</div>
    <div class="event-title">${ev.title}</div>
    <div class="event-text">${ev.text(G)}</div>
    <div class="choices">
      ${ev.choices.map((c,i)=>`
        <button class="choice-btn" onclick="chooseOption(${i})" data-idx="${i}">${c.text}</button>
      `).join('')}
    </div>
    <div id="result-area"></div>
  `;
  div.setAttribute('data-evid', ev.id);
  $('event-area').appendChild(div);
  window._curEv = ev;
}

function chooseOption(idx){
  const ev = window._curEv;
  if(!ev) return;
  const c = ev.choices[idx];

  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled = true;
    if(parseInt(b.dataset.idx)===idx) b.classList.add('chosen');
  });

  const deltas = applyEffect(c.effect);
  if(c.effect.health)  G.health = c.effect.health;
  if(c.setFlag) G.flags[c.setFlag.key] = c.setFlag.val;
  if(ev.once) G.seenOnce.add(ev.id);

  // Build delta display
  const statLabels = { op:'操作', aw:'意識', tf:'配合', mt:'心理', cm:'魅力' };
  const dLines = [];
  Object.keys(deltas).forEach(k=>{
    if(k === 'money'){
      const m = deltas[k];
      if(m !== 0) dLines.push(`<span class="${m>0?'d-money':'d-neg'}">${m>0?'收入':'支出'} ${fmtMoney(m)}</span>`);
    } else if(statLabels[k]) {
      const v = deltas[k];
      if(v!==0) dLines.push(`<span class="${v>0?'d-pos':'d-neg'}">${statLabels[k]} ${v>0?'+':''}${v}</span>`);
    }
  });
  if(c.effect.fans && c.effect.fans!==0){
    const f = c.effect.fans;
    dLines.push(`<span class="${f>0?'d-pos':'d-neg'}">粉絲 ${f>0?'+':''}${f}</span>`);
  }
  if(c.effect.progress) dLines.push(`<span class="d-neu">進度 +${c.effect.progress}</span>`);

  const shouldAdvance = !!c.advance;
  $('result-area').innerHTML = `
    <div class="result-box">
      <div>${c.result}</div>
      ${dLines.length?`<div class="delta-line">${dLines.join('')}</div>`:''}
    </div>
    <button class="btn-next" onclick="${shouldAdvance?'advanceStage()':'nextTurn()'}">
      ${shouldAdvance?'進入下一階段 →':'繼續 →'}
    </button>
  `;

  refreshPanel(deltas);
  addLog(`${ev.title} → ${c.text.slice(0,20)}…`);
}

// TRANSFER WINDOW

function generateTransferOffers(){
  const stage = G.stage;
  const tierList = stage <= 2 ? ['B','A'] : stage <= 3 ? ['A','S'] : ['S','S','A'];
  const used = new Set([G.currentTeam]);
  const offers = [];
  const count = Math.min(3, 1 + Math.floor(Math.random()*2));
  for(let i=0;i<count;i++){
    const tier = tierList[Math.floor(Math.random()*tierList.length)];
    const pool = TEAMS[tier].filter(t=>!used.has(t.name));
    if(!pool.length) continue;
    const team = pool[Math.floor(Math.random()*pool.length)];
    used.add(team.name);
    const multiplier = tier==='S'?(1.8+Math.random()*0.8):tier==='A'?(1.3+Math.random()*0.5):(1.0+Math.random()*0.3);
    const baseSalary = G.salary > 0 ? G.salary : STAGE_SALARIES[stage];
    const newSalary = Math.round(baseSalary * multiplier);
    const fanBonus = tier==='S'?5000:tier==='A'?2000:500;
    const tfPenalty = tier==='S'?-12:tier==='A'?-6:0;
    offers.push({ team:team.name, desc:team.desc, tier, newSalary, fanBonus, tfPenalty, multiplier });
  }
  return offers;
}

function openTransferWindow(){
  const offers = generateTransferOffers();
  if(offers.length === 0){ nextTurn(); return; }
  window._transferOffers = offers;

  clearPage();
  const offerHtml = offers.map((o,i)=>`
    <div class="offer-item">
      <div class="offer-header">
        <span class="offer-name">${o.team}</span>

        <span class="d-pos">粉絲+${fmtFans(o.fanBonus)}</span>
        ${o.tfPenalty<0?`<span class="d-neg">初期配合${o.tfPenalty}</span>`:''}
      </div>
      <button class="btn-offer" onclick="acceptTransfer(${i})">接受此邀約</button>
    </div>
  `).join('');

  const div = document.createElement('div');
  div.className = 'transfer-card';
  div.innerHTML = `

  addLog('轉會期：收到轉會邀約');

function acceptTransfer(idx){

// ══════════════════════════════════════════════
// TURN MANAGEMENT
// ══════════════════════════════════════════════
function nextTurn(){
  G.turn++;

  // Salary income & living expenses
  if(G.salary > 0){
    G.money += G.salary;
    G.totalEarned += G.salary;
  }
  const expense = STAGE_EXPENSES[G.stage] || 0;
  if(expense > 0) G.money = Math.max(0, G.money - expense);

  // Natural fatigue recovery
  G.fatigue = Math.max(0, G.fatigue - 2);

  // End condition
  if(G.stage >= 5 && G.progress >= 100){ showEnd(); return; }

  // Transfer window check (stage >= 2, after cooldown)
  if(G.stage >= 2 && G.transferCooldown > 0) G.transferCooldown--;
  if(G.stage >= 2 && G.transferCooldown === 0 && Math.random() < 0.45){
    G.transferCooldown = 15 + Math.floor(Math.random()*10);
    openTransferWindow();
    return;
  }

  // Weekly match every 7 turns
  if(G.turn % 7 === 0 && G.stage >= 1){ renderMatch(); return; }

  // Next event
  const ev = pickEvent();
  if(!ev){ showEnd(); return; }
  renderEvent(ev);
  refreshPanel();
}

function advanceStage(){
  G.stage++;
  G.progress = 0;
  G.seenOnce.clear();
  G.fatigue = Math.max(0, G.fatigue - 10);
  G.salary = STAGE_SALARIES[G.stage] || G.salary;

  if(G.stage >= STAGES.length){ showEnd(); return; }

  // Assign team
  if(G.stage === 2 && !G.currentTeam){
    const pool = TEAMS.B;
    G.currentTeam = pool[Math.floor(Math.random()*pool.length)].name;
  } else if(G.stage === 3 && !G.currentTeam){
    const pool = TEAMS.A;
    G.currentTeam = pool[Math.floor(Math.random()*pool.length)].name;
  }

  clearPage();
  const div = document.createElement('div');
  div.className = 'stage-card';
  div.innerHTML = `
    <div class="event-stage-tag" style="background:rgba(240,165,0,.15);border-color:rgba(240,165,0,.4);color:var(--accent)">
      ✦ 階段晉升
    </div>
    <div class="event-title">歡迎來到${STAGES[G.stage].name}</div>
    <div class="event-text">
      你完成了上一個階段的挑戰，踏上了全新的競技舞台。新的對手、新的機遇、新的壓力，都在等著你。
      ${G.currentTeam?`<br><br>你現在效力於：<strong style="color:var(--accent)">${G.currentTeam}</strong>`:''}
    </div>
    ${G.salary>0?`
    <div class="result-box" style="border-color:rgba(58,213,100,.25)">
      <div>薪資調整：月薪提升至 <span class="d-money">${fmtMoney(G.salary)}/回合</span></div>
    </div>`:''}
    <button class="btn-next" style="background:linear-gradient(135deg,#f0a500,#c88000);color:#0a0c12;" onclick="nextTurn()">
      迎接挑戰 →
    </button>
  `;
  $('event-area').appendChild(div);
  refreshPanel();
  addLog(`晉升至：${STAGES[G.stage].name}`);
}

// ══════════════════════════════════════════════
// END SCREEN
// ══════════════════════════════════════════════
function showEnd(){
  const s = G.stats;
  const avgStat = Math.round((s.op+s.aw+s.tf+s.mt+s.cm)/5);
  const stageName = STAGES[Math.min(G.stage,STAGES.length-1)].name;
  let title, comment;
  if(G.stage >= 5 && G.progress >= 100){
    title = '傳奇落幕';
    comment = `${G.char.name}，你從默默無聞的路人，一路拼搏到了電競的頂點。那些無數個深夜的訓練、賽場上的高光瞬間、面對壓力時的堅守——這一切都構成了你獨一無二的職業生涯。你的名字，將永遠留在電競的歷史中。`;
  } else if(G.stage >= 4){
    title = '榮耀生涯';
    comment = `${G.char.name}打出了一段令人尊敬的職業生涯，達到了知名選手的高度。雖然沒能衝到最頂峰，但${G.matchWins}場勝利和無數粉絲的支持，是你奮鬥的最好見證。`;
  } else if(G.stage >= 3){
    title = 'KPL老將';
    comment = `${G.char.name}在KPL舞台留下了自己的印記。電競之路充滿了未知，但你用${G.turn}個回合的努力，證明了自己的價值。`;
  } else {
    title = '沒能走到最後';
    comment = `${G.char.name}的電競夢想止步於${stageName}。但每一次失敗都是成長，每一個選擇都刻入了你的人生。電競不只是舞台，也是你最熱愛的東西。`;
  }

  $('end-title').textContent = title;
  $('end-sub').textContent = `${G.char.name} | ${G.char.id} | ${stageName}`;
  $('end-stats').innerHTML = `
    <div class="end-stat-item"><div class="end-stat-label">最終粉絲</div><div class="end-stat-val">${fmtFans(G.fans)}</div></div>
    <div class="end-stat-item"><div class="end-stat-label">職業回合</div><div class="end-stat-val">${G.turn}</div></div>
    <div class="end-stat-item"><div class="end-stat-label">比賽勝負</div><div class="end-stat-val">${G.matchWins}勝${G.matchLosses}敗</div></div>
    <div class="end-stat-item"><div class="end-stat-label">綜合能力</div><div class="end-stat-val">${avgStat}</div></div>
    <div class="end-stat-item"><div class="end-stat-label">個人存款</div><div class="end-stat-val">${fmtMoney(G.money)}</div></div>
    <div class="end-stat-item"><div class="end-stat-label">職業總收入</div><div class="end-stat-val">${fmtMoney(G.totalEarned)}</div></div>
  `;
  $('end-comment').textContent = comment;
  show('s-end');
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goCreate(){ show('s-create'); }

document.querySelectorAll('.pos-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
  });
});
document.querySelectorAll('.career-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.career-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    $('career-tip').textContent = btn.dataset.tip || '';
  });
});

function startGame(){
  const name   = $('c-name').value.trim();
  const id     = $('c-id').value.trim();
  const age    = $('c-age').value;
  const gender = $('c-gender').value;
  const pos    = document.querySelector('.pos-btn.sel')?.dataset.val;
  const career = document.querySelector('.career-btn.sel')?.dataset.val;

  if(!name)  { alert('請輸入真實姓名'); return; }
  if(!id)    { alert('請輸入遊戲ID'); return; }
  if(!pos)   { alert('請選擇主要位置'); return; }
  if(!career){ alert('請選擇入行背景'); return; }

  const char = { name, id, age, gender, pos };
  initG(char, career);
  show('s-game');
  refreshPanel();
  setTimeout(()=>{ const ev=pickEvent(); if(ev) renderEvent(ev); }, 300);
}
</script>
