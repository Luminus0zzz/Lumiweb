<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者榮耀職業選手人生模擬器</title>
<style>
:root{
  --bg:#0a0c12;--panel:#13161f;--border:#1e2433;--accent:#f0a500;
  --accent2:#3a7bd5;--red:#e03a3a;--green:#3adb76;--text:#d0d8f0;
  --sub:#6a7490;--bar:#1e2433;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei',sans-serif;min-height:100vh;line-height:1.6;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* ── TITLE SCREEN ── */
#s-title{
  flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0d1629 0%,#0a0c12 70%);
  text-align:center;padding:40px;
}
#s-title h1{font-size:2.6rem;font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#f0a500,#e8d000,#f0a500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:.4rem;}
#s-title .sub{color:var(--sub);font-size:.95rem;margin-bottom:3rem;}
.btn-main{
  background:linear-gradient(135deg,#f0a500,#c88000);
  color:#0a0c12;font-size:1.1rem;font-weight:700;
  padding:14px 50px;border-radius:30px;
  box-shadow:0 0 20px rgba(240,165,0,.4);
  transition:transform .2s,box-shadow .2s;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(240,165,0,.6);}
.badge{display:inline-block;margin-top:2rem;padding:6px 16px;
  border:1px solid var(--border);border-radius:20px;
  color:var(--sub);font-size:.8rem;}

/* ── CREATE SCREEN ── */
#s-create{
  flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;
}
.create-box{
  background:var(--panel);border:1px solid var(--border);
  border-radius:16px;padding:36px 40px;width:100%;max-width:520px;
}
.create-box h2{font-size:1.5rem;font-weight:800;margin-bottom:24px;
  color:var(--accent);}
.form-row{margin-bottom:18px;}
.form-row label{display:block;font-size:.85rem;color:var(--sub);margin-bottom:6px;}
.form-row input,.form-row select,.form-row textarea{
  width:100%;background:#0d1020;border:1px solid var(--border);
  color:var(--text);padding:10px 14px;border-radius:8px;
  font-size:.95rem;font-family:inherit;
}
.form-row input:focus,.form-row select:focus{
  outline:none;border-color:var(--accent);
}
.form-row textarea{resize:vertical;height:80px;}
.form-row select option{background:#0d1020;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.career-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px;}
.career-btn{
  background:#0d1020;border:1px solid var(--border);
  color:var(--sub);padding:10px 6px;border-radius:8px;
  font-size:.82rem;text-align:center;transition:all .2s;
}
.career-btn:hover{border-color:var(--accent2);color:var(--text);}
.career-btn.sel{border-color:var(--accent);color:var(--accent);
  background:rgba(240,165,0,.08);}
.pos-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:4px;}
.pos-btn{
  background:#0d1020;border:1px solid var(--border);
  color:var(--sub);padding:8px 4px;border-radius:6px;
  font-size:.8rem;transition:all .2s;
}
.pos-btn:hover{border-color:var(--accent2);color:var(--text);}
.pos-btn.sel{border-color:var(--accent);color:var(--accent);
  background:rgba(240,165,0,.08);}
.create-hint{font-size:.78rem;color:var(--sub);margin-top:4px;}

/* ── GAME SCREEN ── */
#s-game{flex-direction:row;}
/* Left Panel */
#left-panel{
  width:280px;min-width:260px;background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:20px 18px;
  overflow-y:auto;
}
.player-card{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.player-avatar{
  width:72px;height:72px;border-radius:50%;margin:0 auto 10px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;font-weight:900;color:#fff;
}
.player-name{font-size:1.1rem;font-weight:700;}
.player-id{font-size:.82rem;color:var(--sub);}
.player-stage{
  display:inline-block;margin-top:6px;padding:3px 12px;
  border-radius:12px;font-size:.75rem;font-weight:700;
  background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.3);
  color:var(--accent);
}
.section-label{font-size:.72rem;text-transform:uppercase;
  letter-spacing:2px;color:var(--sub);margin-bottom:10px;}
.stat-row{margin-bottom:10px;}
.stat-header{display:flex;justify-content:space-between;
  font-size:.82rem;margin-bottom:4px;}
.stat-name{color:var(--sub);}
.stat-val{font-weight:700;}
.stat-bar-track{height:6px;background:var(--bar);border-radius:3px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.stat-delta{font-size:.7rem;font-weight:700;opacity:0;transition:opacity .3s;}
.stat-delta.pos{color:var(--green);}
.stat-delta.neg{color:var(--red);}
.stat-delta.show{opacity:1;}
.fan-box{
  background:#0d1020;border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;margin-top:6px;
}
.fan-count{font-size:1.3rem;font-weight:800;color:var(--accent);}
.fan-tier{font-size:.75rem;color:var(--sub);}
.progress-box{margin-top:14px;}
.progress-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:6px;}
.progress-track{height:8px;background:var(--bar);border-radius:4px;overflow:hidden;}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:4px;transition:width .8s ease;
}
.turn-info{margin-top:14px;font-size:.82rem;color:var(--sub);}
.turn-info span{color:var(--text);font-weight:700;}
/* Right Panel */
#right-panel{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
#event-area{
  flex:1;overflow-y:auto;padding:28px 32px;
}
.event-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:24px 26px;margin-bottom:20px;
  animation:fadeIn .4s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.event-stage-tag{
  display:inline-block;padding:3px 10px;border-radius:10px;
  font-size:.72rem;font-weight:700;margin-bottom:12px;
  background:rgba(58,123,213,.15);border:1px solid rgba(58,123,213,.3);
  color:var(--accent2);
}
.event-title{font-size:1.2rem;font-weight:800;margin-bottom:12px;}
.event-text{font-size:.92rem;color:#b0bcd8;line-height:1.9;}
.choices{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
.choice-btn{
  background:#0d1020;border:1px solid var(--border);
  color:var(--text);padding:12px 18px;border-radius:10px;
  font-size:.9rem;text-align:left;transition:all .2s;
}
.choice-btn:hover:not(:disabled){
  border-color:var(--accent2);
  background:rgba(58,123,213,.08);
}
.choice-btn.chosen{
  border-color:var(--accent);
  background:rgba(240,165,0,.08);
}
.choice-btn:disabled{opacity:.6;}
.result-box{
  background:rgba(58,123,213,.06);border:1px solid rgba(58,123,213,.2);
  border-radius:10px;padding:16px 18px;margin-top:16px;
  font-size:.88rem;line-height:1.8;color:#c0ccec;
  animation:fadeIn .3s ease;
}
.delta-line{margin-top:10px;font-size:.82rem;}
.d-pos{color:var(--green);}
.d-neg{color:var(--red);}
.d-neu{color:var(--sub);}
.btn-next{
  margin-top:16px;
  background:linear-gradient(135deg,#3a7bd5,#2a5aa0);
  color:#fff;padding:11px 28px;border-radius:8px;font-size:.9rem;font-weight:700;
  transition:transform .2s,box-shadow .2s;
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(58,123,213,.4);}
.match-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:22px 26px;margin-bottom:20px;
  animation:fadeIn .4s ease;
}
.match-tag{
  display:inline-block;padding:3px 10px;border-radius:10px;
  font-size:.72rem;font-weight:700;margin-bottom:12px;
  background:rgba(224,58,58,.12);border:1px solid rgba(224,58,58,.3);
  color:var(--red);
}
.match-result{font-size:1.4rem;font-weight:900;margin:10px 0;}
.win{color:var(--green);}
.loss{color:var(--red);}

/* Event log */
#log-area{
  height:140px;border-top:1px solid var(--border);
  overflow-y:auto;padding:12px 24px;background:#0d1020;
}
.log-entry{font-size:.78rem;color:var(--sub);padding:2px 0;border-bottom:1px solid rgba(30,36,51,.5);}
.log-entry:last-child{border:none;}
.log-turn{color:var(--accent2);font-weight:700;margin-right:6px;}

/* END SCREEN */
#s-end{
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;text-align:center;
  background:radial-gradient(ellipse at center,#0d1629 0%,#0a0c12 70%);
}
.end-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:540px;width:100%;}
.end-title{font-size:1.8rem;font-weight:900;color:var(--accent);margin-bottom:8px;}
.end-sub{color:var(--sub);margin-bottom:24px;}
.end-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
.end-stat-item{background:#0d1020;border:1px solid var(--border);border-radius:10px;padding:14px;}
.end-stat-label{font-size:.75rem;color:var(--sub);}
.end-stat-val{font-size:1.3rem;font-weight:800;color:var(--accent);}
.end-comment{
  background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.2);
  border-radius:10px;padding:16px;font-size:.9rem;color:#c0b870;margin-bottom:20px;
  line-height:1.8;
}
</style>
</head>
<body>

<!-- TITLE -->
<div id="s-title" class="screen active">
  <h1>王者榮耀<br>職業選手人生模擬器</h1>
  <p class="sub">從路人王到KPL頂峰，你的電競生涯由你書寫</p>
  <button class="btn-main" onclick="goCreate()">開始遊戲</button>
  <div class="badge">純文字 · 無需API · 多結局</div>
</div>

<!-- CREATE -->
<div id="s-create" class="screen">
  <div class="create-box">
    <h2>創建選手檔案</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>真實姓名</label>
        <input id="c-name" placeholder="例：林小宇" maxlength="8">
      </div>
      <div class="form-row">
        <label>遊戲ID</label>
        <input id="c-id" placeholder="例：Phantom" maxlength="16">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>年齡</label>
        <select id="c-age">
          <option value="16">16歲</option>
          <option value="17">17歲</option>
          <option value="18" selected>18歲</option>
          <option value="19">19歲</option>
          <option value="20">20歲</option>
        </select>
      </div>
      <div class="form-row">
        <label>性別</label>
        <select id="c-gender">
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>主要位置</label>
      <div class="pos-grid" id="pos-grid">
        <button class="pos-btn" data-val="打野">打野</button>
        <button class="pos-btn" data-val="中路">中路</button>
        <button class="pos-btn" data-val="對抗路">對抗路</button>
        <button class="pos-btn" data-val="輔助">輔助</button>
        <button class="pos-btn" data-val="射手">射手</button>
      </div>
    </div>
    <div class="form-row">
      <label>入行背景</label>
      <div class="career-grid" id="career-grid">
        <button class="career-btn" data-val="天才少年" data-tip="技術天花板高，但容易驕傲">天才少年</button>
        <button class="career-btn" data-val="努力型" data-tip="成長穩定，狀態一致">努力型</button>
        <button class="career-btn" data-val="直播出道" data-tip="粉絲基礎好，但技術需打磨">直播出道</button>
        <button class="career-btn" data-val="線下賽出身" data-tip="臨場感強，團隊配合好">線下賽出身</button>
        <button class="career-btn" data-val="半路轉職" data-tip="起點低，但可塑性強">半路轉職</button>
        <button class="career-btn" data-val="電競世家" data-tip="資源豐富，壓力也大">電競世家</button>
      </div>
      <div class="create-hint" id="career-tip">選擇背景以查看說明</div>
    </div>
    <div class="form-row">
      <label>標誌性英雄（選填）</label>
      <input id="c-heroes" placeholder="例：魯班七號, 孫悟空" maxlength="30">
    </div>
    <button class="btn-main" style="width:100%;margin-top:8px;" onclick="startGame()">踏上征程</button>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <!-- Left Panel -->
  <div id="left-panel">
    <div class="player-card">
      <div class="player-avatar" id="avatar-letter">A</div>
      <div class="player-name" id="p-name">林小宇</div>
      <div class="player-id" id="p-id">@Phantom</div>
      <div class="player-stage" id="p-stage">路人期</div>
    </div>

    <div class="section-label">核心數值</div>
    <div id="stats-panel">
      <!-- generated -->
    </div>

    <div class="fan-box">
      <div class="fan-count" id="fan-count">0</div>
      <div class="fan-tier" id="fan-tier">無名選手</div>
    </div>

    <div class="progress-box">
      <div class="progress-label">
        <span id="stage-from">路人期</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-bar" style="width:0%"></div></div>
      <div class="progress-label" style="margin-top:4px;">
        <span style="color:var(--sub);font-size:.72rem;">距晉升</span>
        <span id="stage-to" style="color:var(--accent2);font-size:.72rem;">青訓期</span>
      </div>
    </div>

    <div class="turn-info">
      第 <span id="turn-num">1</span> 回合 &nbsp;|&nbsp;
      疲勞 <span id="fatigue-num">20</span>
    </div>
    <div class="turn-info" style="margin-top:4px;">
      體能狀態：<span id="health-state">正常</span>
    </div>
  </div>

  <!-- Right Panel -->
  <div id="right-panel">
    <div id="event-area"></div>
    <div id="log-area"></div>
  </div>
</div>

<!-- END -->
<div id="s-end" class="screen">
  <div class="end-box">
    <div class="end-title" id="end-title">生涯落幕</div>
    <div class="end-sub" id="end-sub">你的電競旅途已走到終點</div>
    <div class="end-stats" id="end-stats"></div>
    <div class="end-comment" id="end-comment"></div>
    <button class="btn-main" onclick="location.reload()">再次挑戰</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// STAGE DATA
// ══════════════════════════════════════════════
const STAGES = [
  { name:'路人期',   next:'青訓/試訓期' },
  { name:'青訓/試訓',next:'KGL聯賽' },
  { name:'KGL聯賽', next:'KPL正賽' },
  { name:'KPL正賽', next:'知名選手' },
  { name:'知名選手', next:'生涯巔峰' },
  { name:'生涯巔峰', next:'' },
];

const STAT_CFG = [
  { key:'op', label:'操作水平', color:'#3a7bd5' },
  { key:'aw', label:'意識大局', color:'#8b5cf6' },
  { key:'tf', label:'團隊配合', color:'#059669' },
  { key:'mt', label:'心理素質', color:'#d97706' },
  { key:'cm', label:'個人魅力', color:'#db2777' },
];

// ══════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════
let G = null;

function initG(char, career){
  const presets = {
    '天才少年': { op:72, aw:55, tf:45, mt:50, cm:48, fatigue:15, fans:50 },
    '努力型':   { op:58, aw:60, tf:62, mt:65, cm:52, fatigue:20, fans:20 },
    '直播出道': { op:55, aw:50, tf:48, mt:58, cm:78, fatigue:22, fans:300 },
    '線下賽出身':{ op:62, aw:68, tf:70, mt:60, cm:50, fatigue:18, fans:80 },
    '半路轉職': { op:48, aw:45, tf:55, mt:70, cm:55, fatigue:25, fans:10 },
    '電競世家': { op:65, aw:62, tf:55, mt:45, cm:65, fatigue:18, fans:120 },
  };
  const caps = {
    '天才少年': { op:98, aw:85, tf:75, mt:78, cm:80 },
    '努力型':   { op:88, aw:88, tf:90, mt:92, cm:80 },
    '直播出道': { op:82, aw:78, tf:78, mt:80, cm:98 },
    '線下賽出身':{ op:90, aw:92, tf:95, mt:85, cm:78 },
    '半路轉職': { op:95, aw:92, tf:88, mt:95, cm:85 },
    '電競世家': { op:92, aw:90, tf:82, mt:75, cm:90 },
  };
  const base = presets[career] || presets['努力型'];
  const cap  = caps[career]  || caps['努力型'];
  G = {
    stage: 0, turn: 0, progress: 0,
    seenOnce: new Set(), flags: {},
    char, career,
    stats: { op: base.op, aw: base.aw, tf: base.tf, mt: base.mt, cm: base.cm },
    cap,
    fans: base.fans,
    fatigue: base.fatigue,
    health: 'fine',
    teamRel: 50, coachRel: 50, pubRisk: 10,
    team: '',
    matchWins: 0, matchLosses: 0,
    history: [],
  };
}

// ══════════════════════════════════════════════
// EVENT POOL
// ══════════════════════════════════════════════
const EVENTS = [

  // ── Stage 0: 路人期 ──
  {
    id:'e0_rival', stages:[0], once:false, weight:8, milestone:false,
    title:'遇到對手',
    text:(g)=>`在排位賽中，你遇到了同段位的高手「${g.flags.rivalName || '虛空之刃'}」。他的操作讓你印象深刻，賽後他主動加了好友，說想一起上分。`,
    choices:[
      { text:'接受並約好一起研究', effect:{ cm:2, teamRel:4, progress:14, fans:15 }, result:'你們成了互相磨刀石，技術和默契都有所提升。' },
      { text:'接受但只打遊戲不聊天', effect:{ op:3, progress:10 }, result:'你在對局中學到了不少，但沒有建立起深厚的關係。' },
      { text:'婉拒，繼續單排衝分', effect:{ op:2, mt:1, progress:8 }, result:'你堅持自己的節奏，獨立解決問題的能力更強了。' },
    ]
  },
  {
    id:'e0_stream', stages:[0], once:false, weight:6, milestone:false,
    title:'嘗試直播',
    text:(g)=>`一個朋友建議你開個直播，說你的操作值得被更多人看到。你有些猶豫，怕影響訓練。`,
    choices:[
      { text:'開了！全力衝人氣', effect:{ cm:8, fans:200, fatigue:12, op:-2, progress:5 }, result:'直播效果不錯，粉絲漲了一波，但訓練時間被壓縮，技術稍有生疏。' },
      { text:'偶爾直播，主要還是練技術', effect:{ cm:3, fans:60, fatigue:4, progress:8 }, result:'小直播積累了些人氣，也沒耽誤訓練，平衡得不錯。' },
      { text:'不開，專注訓練', effect:{ op:3, mt:2, progress:10, fatigue:-3 }, result:'你謝絕了誘惑，日夜苦練，技術明顯精進。' },
    ]
  },
  {
    id:'e0_family', stages:[0], once:true, weight:5, milestone:false,
    title:'家人的反對',
    text:(g)=>`媽媽發現你每天長時間打遊戲，急了，說你在浪費時間，要你去準備考試。你嘗試解釋電競是一個職業，但她搖了搖頭。`,

// UI HELPERS
// ══════════════════════════════════════════════
function $(id){ return document.getElementById(id); }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }

function fanTier(n){
  if(n<100) return '無名選手';
  if(n<2000) return '初露鋒芒';
  if(n<20000) return '小有名氣';
  if(n<200000) return '知名選手';
  return '頂級明星';
}
function fmtFans(n){
  if(n>=10000) return (n/10000).toFixed(1)+'萬';
  return n+'';
}

let deltaTimers = {};
function refreshPanel(deltas={}){
  $('avatar-letter').textContent = G.char.name[0] || '?';
  $('p-name').textContent = G.char.name;
  $('p-id').textContent = '@' + G.char.id;
  $('p-stage').textContent = STAGES[G.stage].name;

  // stats
  const html = STAT_CFG.map(s=>{
    const v = Math.min(G.cap[s.key], Math.max(0, G.stats[s.key]));
    const d = deltas[s.key];
    const dClass = d>0?'pos':d<0?'neg':'';
    const dText = d>0?`+${d}`:d<0?`${d}`:'';
    return `<div class="stat-row">
      <div class="stat-header">
        <span class="stat-name">${s.label}</span>
        <span class="stat-val">${Math.round(v)}</span>
        ${dText?`<span class="stat-delta ${dClass} show" id="sd-${s.key}">${dText}</span>`:`<span class="stat-delta" id="sd-${s.key}"></span>`}
      </div>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${v}%;background:${s.color}"></div></div>
    </div>`;
  }).join('');
  $('stats-panel').innerHTML = html;

  if(Object.keys(deltas).length){
    STAT_CFG.forEach(s=>{
      if(deltaTimers[s.key]) clearTimeout(deltaTimers[s.key]);
      deltaTimers[s.key] = setTimeout(()=>{
        const el = $(`sd-${s.key}`);
        if(el) el.classList.remove('show');
      }, 2500);
    });
  }

  $('fan-count').textContent = fmtFans(G.fans);
  $('fan-tier').textContent = fanTier(G.fans);

  const pct = Math.min(100, G.progress);
  $('prog-bar').style.width = pct + '%';
  $('prog-pct').textContent = Math.round(pct) + '%';
  $('stage-from').textContent = STAGES[G.stage].name;
  $('stage-to').textContent = STAGES[G.stage].next || '功成身退';

  $('turn-num').textContent = G.turn + 1;
  $('fatigue-num').textContent = Math.round(G.fatigue);
  const hMap = { fine:'正常', warning:'需要注意', injured:'受傷' };
  $('health-state').textContent = hMap[G.health] || '正常';
}

function addLog(text){
  G.history.push({ turn: G.turn+1, text });
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-turn">T${G.turn+1}</span>${text}`;
  const la = $('log-area');
  la.appendChild(el);
  la.scrollTop = la.scrollHeight;
}

// ══════════════════════════════════════════════
// EVENT PICKING
// ══════════════════════════════════════════════
function pickEvent(){
  // Check for milestone
  if(G.progress >= 100){
    const ms = EVENTS.find(e=>e.stages.includes(G.stage) && e.milestone && !G.seenOnce.has(e.id));
    if(ms){ G.progress = 100; return ms; }
  }
  // Normal weighted pick
  const pool = EVENTS.filter(e=>{
    if(!e.stages.includes(G.stage)) return false;
    if(e.milestone) return false;
    if(e.once && G.seenOnce.has(e.id)) return false;
    return true;
  });
  if(pool.length === 0) return null;
  const total = pool.reduce((s,e)=>s+e.weight, 0);
  let r = Math.random() * total;
  for(const e of pool){
    r -= e.weight;
    if(r <= 0) return e;
  }
  return pool[pool.length-1];
}

// ══════════════════════════════════════════════
// MATCH SIMULATION (every 7 turns)
// ══════════════════════════════════════════════
function simulateMatch(){
  const { op, aw, tf, mt } = G.stats;
  const score = (op*0.4 + aw*0.3 + tf*0.3) * (mt/100) * (1 - G.fatigue/200);
  const threshold = 50 + Math.random()*25;
  const win = score > threshold;
  if(win){ G.matchWins++; G.fans += Math.floor(Math.random()*300+100); }
  else { G.matchLosses++; G.fatigue += 5; }
  G.fatigue = Math.min(100, G.fatigue + 8);
  G.progress += win ? 8 : 3;
  return win;
}

function renderMatch(){
  const win = simulateMatch();
  const ea = $('event-area');
  const div = document.createElement('div');
  div.className = 'match-card';
  div.innerHTML = `
    <div class="match-tag">⚔ 週賽結算</div>
    <div class="match-result ${win?'win':'loss'}">${win?'勝利！':'敗北...'}</div>
    <p style="color:var(--sub);font-size:.88rem;">
      ${win
        ? `你的${G.char.pos}發揮穩定，帶領隊伍拿下了比賽。`
        : `這場比賽暴露了一些短板，需要繼續改進。`
      }
    </p>
    <div class="delta-line">
      <span class="${win?'d-pos':'d-neg'}">${win?'進度+8':'進度+3'}</span>
      &nbsp;|&nbsp;
      <span class="d-neg">疲勞+${win?8:13}</span>
      ${win?`&nbsp;|&nbsp;<span class="d-pos">粉絲+${100}-${400}</span>`:''}
    </div>
    <button class="btn-next" onclick="nextTurn()">繼續 →</button>
  `;
  ea.appendChild(div);
  ea.scrollTop = ea.scrollHeight;
  refreshPanel();
  addLog(`週賽：${win?'勝利':'失敗'}`);
}

// ══════════════════════════════════════════════
// APPLY EFFECT
// ══════════════════════════════════════════════
function applyEffect(eff){
  const deltas = {};
  const keys = ['op','aw','tf','mt','cm'];
  keys.forEach(k=>{
    if(eff[k] !== undefined){
      deltas[k] = eff[k];
      G.stats[k] = Math.min(G.cap[k], Math.max(0, G.stats[k] + eff[k]));
    }
  });
  if(eff.fans)     G.fans     = Math.max(0, G.fans + eff.fans);
  if(eff.fatigue)  G.fatigue  = Math.min(100, Math.max(0, G.fatigue + eff.fatigue));
  if(eff.teamRel)  G.teamRel  = Math.min(100, Math.max(0, G.teamRel + eff.teamRel));
  if(eff.coachRel) G.coachRel = Math.min(100, Math.max(0, G.coachRel + eff.coachRel));
  if(eff.pubRisk)  G.pubRisk  = Math.min(100, Math.max(0, G.pubRisk + eff.pubRisk));
  if(eff.progress) G.progress = Math.min(105, G.progress + eff.progress);
  return deltas;
}

// ══════════════════════════════════════════════
// RENDER EVENT
// ══════════════════════════════════════════════
function renderEvent(ev){
  const ea = $('event-area');
  const div = document.createElement('div');
  div.className = 'event-card';
  div.innerHTML = `
    <div class="event-stage-tag">${STAGES[G.stage].name}</div>
    <div class="event-title">${ev.title}</div>
    <div class="event-text">${ev.text(G)}</div>
    <div class="choices">
      ${ev.choices.map((c,i)=>`
        <button class="choice-btn" onclick="chooseOption(${i})" data-idx="${i}">${c.text}</button>
      `).join('')}
    </div>
    <div id="result-area"></div>
  `;
  div.setAttribute('data-evid', ev.id);
  ea.appendChild(div);
  ea.scrollTop = ea.scrollHeight;
  // store current event
  window._curEv = ev;
}

function chooseOption(idx){
  const ev = window._curEv;
  if(!ev) return;
  const c = ev.choices[idx];

  // mark chosen
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>{ b.disabled=true; if(parseInt(b.dataset.idx)===idx) b.classList.add('chosen'); });

  // apply effect
  const deltas = applyEffect(c.effect);

  // set health if specified
  if(c.effect.health) G.health = c.effect.health;

  // set flags if specified
  if(c.setFlag) G.flags[c.setFlag.key] = c.setFlag.val;

  // mark once
  if(ev.once) G.seenOnce.add(ev.id);

  // build delta display
  const dLines = [];
  const statLabels = { op:'操作', aw:'意識', tf:'配合', mt:'心理', cm:'魅力' };
  Object.keys(deltas).forEach(k=>{
    const v = deltas[k];
    if(v!==0) dLines.push(`<span class="${v>0?'d-pos':'d-neg'}">${statLabels[k]} ${v>0?'+':''}${v}</span>`);
  });
  if(c.effect.fans && c.effect.fans !== 0){
    const f = c.effect.fans;
    dLines.push(`<span class="${f>0?'d-pos':'d-neg'}">粉絲 ${f>0?'+':''}${f}</span>`);
  }
  if(c.effect.progress) dLines.push(`<span class="d-neu">進度 +${c.effect.progress}</span>`);

  const shouldAdvance = c.advance;
  const resultHtml = `
    <div class="result-box">
      <div>${c.result}</div>
      ${dLines.length ? `<div class="delta-line">${dLines.join(' &nbsp;')}</div>` : ''}
    </div>
    <button class="btn-next" onclick="${shouldAdvance?'advanceStage()':'nextTurn()'}">${shouldAdvance?'進入下一階段 →':'繼續 →'}</button>
  `;

  $('result-area').innerHTML = resultHtml;
  $('event-area').scrollTop = $('event-area').scrollHeight;

  refreshPanel(deltas);
  addLog(`${ev.title} → ${c.text}`);
}

// ══════════════════════════════════════════════
// TURN MANAGEMENT
// ══════════════════════════════════════════════
function nextTurn(){
  G.turn++;
  // Natural fatigue recovery a bit each turn
  G.fatigue = Math.max(0, G.fatigue - 2);
  // Check end condition
  if(G.stage >= 5 && G.progress >= 100){
    showEnd(); return;
  }
  // Weekly match every 7 turns
  if(G.turn % 7 === 0 && G.stage >= 1){
    renderMatch(); return;
  }
  // Pick next event
  const ev = pickEvent();
  if(!ev){ showEnd(); return; }
  renderEvent(ev);
  refreshPanel();
}

function advanceStage(){
  G.stage++;
  G.progress = 0;
  G.seenOnce.clear();
  G.fatigue = Math.max(0, G.fatigue - 10);
  if(G.stage >= STAGES.length){ showEnd(); return; }
  // Team name for higher stages
  if(G.stage >= 2 && !G.team){
    const teams = ['焰火战队','星辰电竞','雷霆战队','极光电竞','钢铁意志'];
    G.team = teams[Math.floor(Math.random()*teams.length)];
  }
  // Show stage transition message
  const ea = $('event-area');
  const div = document.createElement('div');
  div.className = 'event-card';
  div.style.borderColor = 'var(--accent)';
  div.innerHTML = `
    <div class="event-stage-tag" style="background:rgba(240,165,0,.15);border-color:rgba(240,165,0,.4);color:var(--accent)">
      階段晉升
    </div>
    <div class="event-title">✦ 歡迎來到${STAGES[G.stage].name}</div>
    <div class="event-text">你完成了上一個階段的挑戰，踏入了全新的競技舞台。新的對手、新的機遇、新的壓力，都在等著你。</div>
    <button class="btn-next" style="background:linear-gradient(135deg,#f0a500,#c88000);color:#0a0c12;" onclick="nextTurn()">迎接挑戰 →</button>
  `;
  ea.appendChild(div);
  ea.scrollTop = ea.scrollHeight;
  refreshPanel();
  addLog(`晉升至：${STAGES[G.stage].name}`);
}

// ══════════════════════════════════════════════
// END SCREEN
// ══════════════════════════════════════════════
function showEnd(){
  const s = G.stats;
  const avgStat = Math.round((s.op+s.aw+s.tf+s.mt+s.cm)/5);
  const stageName = STAGES[Math.min(G.stage, STAGES.length-1)].name;
  let title, comment;
  if(G.stage >= 5 && G.progress >= 100){
    title = '傳奇落幕';
    comment = `${G.char.name}，你從默默無聞的路人，一路拼搏到了電競的頂點。那些無數個深夜的訓練、賽場上的高光瞬間、面對壓力時的堅守——這一切都構成了你獨一無二的職業生涯。你的名字，將永遠留在電競的歷史中。`;
  } else if(G.stage >= 4){
    title = '榮耀生涯';
    comment = `${G.char.name}打出了一段令人尊敬的職業生涯，達到了知名選手的高度。雖然沒能衝到最頂峰，但${G.matchWins}場勝利和無數粉絲的支持，是你奮鬥的最好見證。`;
  } else if(G.stage >= 3){
    title = 'KPL老將';
    comment = `${G.char.name}在KPL舞台留下了自己的印記。電競之路充滿了未知，但你用${G.turn}個回合的努力，證明了自己的價值。`;
  } else {
    title = '沒能走到最後';
    comment = `${G.char.name}的電競夢想止步於${stageName}。但每一次失敗都是成長，每一個選擇都刻入了你的人生。電競不只是舞台，也是你最熱愛的東西。`;
  }

  $('end-title').textContent = title;
  $('end-sub').textContent = `${G.char.name} | ${G.char.id} | ${stageName}`;
  $('end-stats').innerHTML = `
    <div class="end-stat-item"><div class="end-stat-label">最終粉絲</div><div class="end-stat-val">${fmtFans(G.fans)}</div></div>
    <div class="end-stat-item"><div class="end-stat-label">職業回合</div><div class="end-stat-val">${G.turn}</div></div>
    <div class="end-stat-item"><div class="end-stat-label">比賽勝場</div><div class="end-stat-val">${G.matchWins}勝${G.matchLosses}敗</div></div>
    <div class="end-stat-item"><div class="end-stat-label">綜合能力</div><div class="end-stat-val">${avgStat}</div></div>
  `;
  $('end-comment').textContent = comment;
  show('s-end');
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goCreate(){ show('s-create'); }

// Position picker
document.querySelectorAll('.pos-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
  });
});

// Career picker
document.querySelectorAll('.career-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.career-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    $('career-tip').textContent = btn.dataset.tip || '';
  });
});

function startGame(){
  const name   = $('c-name').value.trim();
  const id     = $('c-id').value.trim();
  const age    = $('c-age').value;
  const gender = $('c-gender').value;
  const pos    = document.querySelector('.pos-btn.sel')?.dataset.val;
  const career = document.querySelector('.career-btn.sel')?.dataset.val;
  const heroes = $('c-heroes').value.trim();

  if(!name){ alert('請輸入真實姓名'); return; }
  if(!id)  { alert('請輸入遊戲ID'); return; }
  if(!pos) { alert('請選擇主要位置'); return; }
  if(!career){ alert('請選擇入行背景'); return; }

  const char = { name, id, age, gender, pos, heroes };
  initG(char, career);
  show('s-game');
  refreshPanel();
  // First event
  setTimeout(()=>{ const ev = pickEvent(); if(ev) renderEvent(ev); }, 300);
}
</script>
